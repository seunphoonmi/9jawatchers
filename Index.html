    .hover-green:hover { background: #22c55e22 !important; }
    .btn-green:hover { transform: translateY(-1px); box-shadow: 0 4px 20px #22c55e44; }

// ─── UI PRIMITIVES ───────────────────────────────────────────────────────────
function Badge({ children, color = C.green }) {
  return (
    <span style={{ background:`${color}22`, color, border:`1px solid ${color}55`,
      borderRadius:20, padding:'2px 10px', fontSize:11, fontWeight:700, whiteSpace:'nowrap' }}>
      {children}
    </span>
  );
}

function Btn({ children, onClick, disabled, variant='green', size='md', full, style={} }) {
  const variants = {
    green:  { bg:`linear-gradient(135deg,${C.green},#16a34a)`, color:'#000', shadow:`${C.green}44` },
    gold:   { bg:`linear-gradient(135deg,${C.gold},#d97706)`,  color:'#000', shadow:`${C.gold}44`  },
    purple: { bg:`linear-gradient(135deg,${C.purple},#7c3aed)`,color:'#fff', shadow:`${C.purple}44`},
    ghost:  { bg:'transparent', color:C.green, shadow:'transparent' },
    danger: { bg:`${C.red}22`,  color:C.red,   shadow:'transparent' },
  };
  const v = variants[variant] || variants.green;
  const pad = size === 'sm' ? '8px 18px' : '13px 28px';
  const fz  = size === 'sm' ? 13 : 15;
  return (
    <button
      onClick={onClick}
      disabled={disabled}
      className={`btn-${variant}`}
      style={{
        background: disabled ? '#1a2e1a' : v.bg,
        color: disabled ? C.muted : v.color,
        border: variant === 'ghost' ? `1px solid ${C.green}` : variant === 'danger' ? `1px solid ${C.red}44` : 'none',
        borderRadius:10, padding:pad, fontWeight:700, fontSize:fz,
        cursor: disabled ? 'not-allowed' : 'pointer',
        width: full ? '100%' : 'auto',
        ...style,
      }}>
      {children}
    </button>
  );
}

function StatCard({ label, value, icon, color = C.green }) {
  return (
    <div className="stat-card" style={{ background:C.card, border:`1px solid ${color}33` }}>
      <div style={{ fontSize:26, marginBottom:6 }}>{icon}</div>

      <div style={{ color:C.muted, fontSize:12, marginTop:4 }}>{label}</div>

}

function Logo({ size = 'md' }) {

}

function Divider() {

// ─── TASK CARD ────────────────────────────────────────────────────────────────
function TaskCard({ task, onComplete }) {
  const [state, setState] = useState(task.done ? 'done' : 'idle');
  const [secs, setSecs]   = useState(50);
  const timer = useRef(null);

  const startTask = () => {
    window.open(task.url, '_blank');
    setState('counting');
    let s = 50;
    timer.current = setInterval(() => {
      s--;
      setSecs(s);
      if (s <= 0) {
        clearInterval(timer.current);
        setState('done');
        onComplete(task.id, task.reward);
      }
    }, 1000);
  };

  useEffect(() => () => clearInterval(timer.current), []);

  const col = TASK_COLOR[task.type] || C.green;
  const isDone = state === 'done' || task.done;

  return (
    <div className="task-card" style={{
      background:C.card, borderRadius:14,
      border:`1px solid ${isDone ? C.green+'44' : C.border}`,
      borderLeft:`4px solid ${isDone ? C.green : col}`,
      padding:'16px 18px', display:'flex', alignItems:'center',
      justifyContent:'space-between', gap:14, opacity: isDone ? 0.7 : 1,
    }}>
      <div style={{ display:'flex', alignItems:'center', gap:14, flex:1, minWidth:0 }}>
        <div style={{ fontSize:22, flexShrink:0 }}>{TASK_ICON[task.type]}</div>
        <div style={{ minWidth:0 }}>
          <div style={{ fontWeight:700, fontSize:14, marginBottom:4,
            whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
            {task.title}
          </div>
          <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
            <Badge color={col}>{task.type}</Badge>
            <Badge color={C.gold}>+{naira(task.reward)}</Badge>
          </div>
        </div>
      </div>
      <div style={{ flexShrink:0, textAlign:'right' }}>
        {isDone ? (
          <span style={{ color:C.green, fontWeight:700, fontSize:13 }}>✓ Done</span>
        ) : state === 'idle' ? (
          <Btn size="sm" onClick={startTask}>Start</Btn>
        ) : (
          <div style={{ textAlign:'center' }}>
            <div className="timer-circle" style={{ background:`${C.gold}22`, border:`2px solid ${C.gold}` }}>
              <div style={{ color:C.gold, fontWeight:900, fontSize:18, lineHeight:1 }}>{secs}</div>
              <div style={{ color:C.muted, fontSize:9 }}>secs</div>
            </div>
            <div style={{ width:60, height:3, background:'#1a2e1a', borderRadius:4, marginTop:6 }}>
              <div className="progress-bar" style={{ width:`${((50-secs)/50)*100}%`,
                height:'100%', background:C.gold, borderRadius:4 }} />
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── AUTH PAGE ────────────────────────────────────────────────────────────────
function AuthPage({ mode, goTo, onLogin }) {
  const isLogin = mode === 'login';
  const [step, setStep]   = useState(1);
  const [form, setForm]   = useState({ name:'', email:'', phone:'', password:'', ref:'' });
  const [loading, setLoading] = useState(false);

  const set = (k, v) => setForm(prev => ({ ...prev, [k]:v }));

  const submit = () => {
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      if (isLogin) {
        if (form.email.toLowerCase().includes('admin')) onLogin('admin');
        else if (form.email.toLowerCase().includes('premium')) onLogin('premium');
        else onLogin('basic');
      } else {
        setStep(2);
      }

                      <div style={{ color:C.muted, fontSize:12 }}>{w.bank} · {w.account} · {w.date}</div>
                    </div>
                    <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                      <span style={{ fontWeight:900, color:C.gold }}>{naira(w.amount)}</span>
                      <Btn size="sm" onClick={() => approve(w.id)}>✓ Approve</Btn>
                      <Btn variant="danger" size="sm" onClick={() => reject(w.id)}>✕ Reject</Btn>
                    </div>
                  </div>
                ))}
            </div>
          </>}

          {/* TASKS */}
          {page === 'tasks' && <>
            <div style={{ marginBottom:22 }}>
              <h1 style={{ fontSize:22, fontWeight:800, marginBottom:4 }}>Manage Tasks</h1>
              <p style={{ color:C.muted, fontSize:13 }}>Upload tasks for Basic and Premium users. Active tasks appear on user dashboards daily.</p>
            </div>
            <div style={{ display:'flex', gap:22, flexWrap:'wrap' }}>
              <div style={{ flex:1, minWidth:300, background:C.card, border:`1px solid ${C.border}`, borderRadius:16, padding:24 }}>
                <div style={{ fontWeight:800, fontSize:16, marginBottom:18 }}>+ Upload New Task</div>
                {taskAdded && (
                  <div style={{ background:`${C.green}22`, border:`1px solid ${C.green}`, borderRadius:8,
                    padding:'10px 14px', marginBottom:14, fontSize:13, color:C.green }}>
                    ✅ Task uploaded successfully!
                  </div>
                )}
                {[['Task Type','type','select',['video','follow','like','comment']],
                  ['Task Title','title','text',null],
                  ['URL / Link','url','text',null],
                  ['Reward Amount (₦)','reward','number',null],
                  ['Assign To','plan','select',['basic','premium','both']]].map(([lbl,k,tp,opts]) => (
                  <div key={k} style={{ marginBottom:14 }}>
                    <label style={{ fontSize:12, color:C.muted, display:'block', marginBottom:5 }}>{lbl}</label>
                    {tp === 'select'
                      ? <select value={tForm[k]} onChange={e => setT(k,e.target.value)} className="withdraw-input">
                          {opts.map(o => <option key={o} value={o}>{o.charAt(0).toUpperCase()+o.slice(1)}</option>)}
                        </select>
                      : <input type={tp} placeholder={lbl} value={tForm[k]}
                          onChange={e => setT(k, e.target.value)} className="withdraw-input" />}
                  </div>
                ))}
                <Btn full onClick={addTask} disabled={!tForm.title || !tForm.url}>Upload Task</Btn>
              </div>
              <div style={{ flex:1.5, minWidth:300 }}>
                <div style={{ fontWeight:700, fontSize:15, marginBottom:14 }}>Active Tasks ({tasks.length})</div>
                <div style={{ display:'flex', flexDirection:'column', gap:8, maxHeight:520, overflowY:'auto' }}>
                  {tasks.map(t => (
                    <div key={t.id} style={{ background:C.card, border:`1px solid ${C.border}`,
                      borderRadius:12, padding:'12px 16px', display:'flex',
                      justifyContent:'space-between', alignItems:'center' }}>
                      <div style={{ minWidth:0, flex:1, marginRight:12 }}>
                        <div style={{ fontSize:13, fontWeight:600, whiteSpace:'nowrap',
                          overflow:'hidden', textOverflow:'ellipsis' }}>{t.title}</div>
                        <div style={{ display:'flex', gap:6, marginTop:5, flexWrap:'wrap' }}>
                          <Badge color={TASK_COLOR[t.type] || C.green}>{t.type}</Badge>
                          <Badge color={C.gold}>₦{t.reward}</Badge>
                          <Badge color={C.muted}>{t.plan_target || t.plan || 'both'}</Badge>
                        </div>
                      </div>
                      <Btn variant="danger" size="sm" onClick={() => removeTask(t.id)}>Remove</Btn>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </>}

          {/* WITHDRAWALS */}
          {page === 'withdrawals' && <>
            <div style={{ marginBottom:22 }}>
              <h1 style={{ fontSize:22, fontWeight:800, marginBottom:4 }}>Withdrawal Requests</h1>
              <p style={{ color:C.muted, fontSize:13 }}>Approve or reject withdrawal requests. Approved transfers are processed via Paystack.</p>
            </div>
            <div style={{ display:'flex', gap:14, marginBottom:24, flexWrap:'wrap' }}>
              <StatCard label="Pending"  value={String(pending.length)}  icon="⏳" color={C.gold}  />
              <StatCard label="Approved" value={String(approved.length)} icon="✅" color={C.green} />
              <StatCard label="Rejected" value={String(rejected.length)} icon="❌" color={C.red}   />
              <StatCard label="Total Volume" value={naira(withdrawals.reduce((s,w) => s+w.amount, 0))} icon="💸" color={C.blue} />
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
              {withdrawals.map(w => (
                <div key={w.id} style={{ background:C.card, border:`1px solid ${C.border}`,
                  borderRadius:14, padding:'16px 20px' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:12 }}>
                    <div>
                      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:5, flexWrap:'wrap' }}>
                        <span style={{ fontWeight:700 }}>{w.user}</span>
                        <Badge color={w.plan==='premium' ? C.purple : C.green}>{w.plan}</Badge>
                      </div>
                      <div style={{ color:C.muted, fontSize:12 }}>{w.bank} · {w.account} · {w.date}</div>
                    </div>
                    <div style={{ display:'flex', alignItems:'center', gap:12, flexWrap:'wrap' }}>
                      <span style={{ fontWeight:900, fontSize:18, color:C.gold }}>{naira(w.amount)}</span>
                      {w.status === 'pending'
                        ? <>
                            <Btn size="sm" onClick={() => approve(w.id)}>✓ Approve</Btn>
                            <Btn variant="danger" size="sm" onClick={() => reject(w.id)}>✕ Reject</Btn>
                          </>
                        : statusBadge(w.status)}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </>}

          {/* USERS */}
          {page === 'users' && <>
            <div style={{ marginBottom:22 }}>
              <h1 style={{ fontSize:22, fontWeight:800, marginBottom:4 }}>User Management</h1>
              <p style={{ color:C.muted, fontSize:13 }}>View and manage all registered users.</p>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {[{ name:'Oluwaseun Ogunseye', email:'seun@email.com',  plan:'premium', balance:14500, joined:'10 May', tasks:18, refs:3 },
                { name:'Chidi Okafor',       email:'chidi@email.com', plan:'basic',   balance:3200,  joined:'11 May', tasks:6,  refs:1 },
                { name:'Amaka Nwosu',        email:'amaka@email.com', plan:'premium', balance:22000, joined:'8 May',  tasks:20, refs:7 },
                { name:'Tunde Balogun',      email:'tunde@email.com', plan:'basic',   balance:1800,  joined:'12 May', tasks:5,  refs:0 },
                { name:'Kelechi Ike',        email:'kele@email.com',  plan:'premium', balance:9700,  joined:'9 May',  tasks:15, refs:2 },
                { name:'Ngozi Eze',          email:'ngozi@email.com', plan:'basic',   balance:5400,  joined:'7 May',  tasks:8,  refs:4 },
              ].map((u, i) => (
                <div key={i} style={{ background:C.card, border:`1px solid ${C.border}`,
                  borderRadius:14, padding:'14px 20px', display:'flex',
                  justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:12 }}>
                  <div>
                    <div style={{ fontWeight:700 }}>{u.name}</div>
                    <div style={{ color:C.muted, fontSize:12, marginTop:3 }}>{u.email} · Joined {u.joined}</div>
                  </div>
                  <div style={{ display:'flex', gap:12, alignItems:'center', flexWrap:'wrap' }}>
                    <Badge color={u.plan==='premium' ? C.purple : C.green}>{u.plan}</Badge>
                    <span style={{ color:C.gold, fontWeight:700, fontSize:14 }}>{naira(u.balance)}</span>
                    <span style={{ color:C.muted, fontSize:12 }}>Tasks: {u.tasks}</span>
                    <span style={{ color:C.muted, fontSize:12 }}>Refs: {u.refs}</span>
                    <Btn variant="danger" size="sm">Suspend</Btn>
                  </div>
                </div>
              ))}
            </div>
          </>}

        </div>
      </div>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('landing');
  const [role, setRole]     = useState(null);

  const login = (r) => { setRole(r); setScreen('app'); };
  const logout = () => { setRole(null); setScreen('landing'); };

  if (screen === 'landing') return <LandingPage goTo={setScreen} />;
  if (screen === 'login')   return <AuthPage mode="login"  goTo={setScreen} onLogin={login} />;
  if (screen === 'signup')  return <AuthPage mode="signup" goTo={setScreen} onLogin={login} />;
  if (screen === 'app') {
    if (role === 'admin') return <AdminDashboard onLogout={logout} />;
    return <UserDashboard plan={role} goTo={setScreen} onLogout={logout} />;
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

    .plan-card:hover { transform: translateY(-4px); border-color: #22c55e55; }
    .stat-card { border-radius: 14px; padding: 18px 20px; flex: 1; min-width: 160px; background: var(--bg-card); }
    
    .withdraw-input { width: 100%; background: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 10px; padding: 11px 14px; color: var(--clr-text); font-size: 14px; }
    .withdraw-input:focus { border-color: var(--clr-green); }
    select.withdraw-input option { background: #162a1b; }
    
    .timer-circle { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .progress-bar { transition: width 0.2s linear; }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .modal-overlay { position: fixed; inset: 0; background: #000000cc; display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }

  const config = styles[variant] || styles.green;
  return (

      style={{
        background: disabled ? '#1a2e1a' : config.bg,

// ─── TASK CARD ENGINE ────────────────────────────────────────────────────────
function TaskCard({ task, onComplete, globalUserTasksState }) {
  const isInitiallyDone = globalUserTasksState?.[task.id] || false;
  const [state, setState] = useState(isInitiallyDone ? 'done' : 'idle');
  const [secs, setSecs] = useState(50);
  const timerRef = useRef(null);

  useEffect(() => {
    if (globalUserTasksState?.[task.id]) {
      setState('done');
    }
  }, [globalUserTasksState, task.id]);

  const startTask = () => {
    window.open(task.url, '_blank');
    setState('counting');
    let currentSecs = 50;
    timerRef.current = setInterval(() => {
      currentSecs--;
      setSecs(currentSecs);
      if (currentSecs <= 0) {
        clearInterval(timerRef.current);
        setState('done');
        onComplete(task.id, task.reward);
      }
    }, 1000);
  };

  useEffect(() => () => clearInterval(timerRef.current), []);

  const themeColor = TASK_COLOR[task.type] || '#22c55e';
  const isCompleted = state === 'done';

  return (
    <div className="fade-in" style={{
      background: 'var(--bg-card)', borderRadius: 14,
      border: `1px solid ${isCompleted ? '#22c55e44' : 'var(--border-color)'}`,
      borderLeft: `4px solid ${isCompleted ? '#22c55e' : themeColor}`,
      padding: '16px 18px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 14,
      opacity: isCompleted ? 0.65 : 1
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14, flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 22 }}>{TASK_ICON[task.type]}</div>
        <div style={{ minWidth: 0 }}>
          <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{task.title}</div>
          <div style={{ display: 'flex', gap: 6 }}>
            <Badge color={themeColor}>{task.type}</Badge>
            <Badge color="#f59e0b">+{naira(task.reward)}</Badge>
          </div>
        </div>
      </div>
      <div>
        {isCompleted ? (
          <span style={{ color: '#22c55e', fontWeight: 700, fontSize: 14 }}>✓ Credited</span>
        ) : state === 'idle' ? (
          <Btn size="sm" onClick={startTask}>Start</Btn>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
            <div className="timer-circle" style={{ background: '#f59e0b11', border: '2px solid #f59e0b' }}>
              <span style={{ color: '#f59e0b', fontWeight: 900, fontSize: 16 }}>{secs}s</span>
            </div>
            <div style={{ width: 60, height: 4, background: '#1a2e1a', borderRadius: 4, overflow: 'hidden' }}>
              <div className="progress-bar" style={{ width: `${((50 - secs) / 50) * 100}%`, height: '100%', background: '#f59e0b' }} />
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── AUTHENTICATION FLOW & SYSTEM GATEWAY ─────────────────────────────────────
function AuthPage({ mode, setScreen, onLoginSuccess, initialSelectedPlan }) {
  const isLogin = mode === 'login';
  const [step, setStep] = useState(1);
  const [selectedPlan, setSelectedPlan] = useState(initialSelectedPlan || 'basic');
  const [formData, setFormData] = useState({ name: '', email: '', phone: '', password: '', ref: '' });
  const [isProcessing, setIsProcessing] = useState(false);
  const [paystackSimulated, setPaystackSimulated] = useState(false);

  useEffect(() => {
    if (initialSelectedPlan) {
      setSelectedPlan(initialSelectedPlan);
    }
  }, [initialSelectedPlan]);

  const handleAuthSubmit = (e) => {
    e.preventDefault();
    setIsProcessing(true);
    setTimeout(() => {
      setIsProcessing(false);
      if (isLogin) {
        if (formData.email.toLowerCase().includes('admin')) onLoginSuccess('admin');
        else if (formData.email.toLowerCase().includes('premium')) onLoginSuccess('premium');
        else onLoginSuccess('basic');
      } else {
        setStep(2); // Advance to Paystack processing gateway interface simulation
      }
    }, 1000);
  };

  const handlePaystackExecute = () => {
    setPaystackSimulated(true);
    setIsProcessing(true);
    setTimeout(() => {
      setIsProcessing(false);
      setPaystackSimulated(false);
      onLoginSuccess(selectedPlan);
    }, 2000);
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
      <div className="fade-in" style={{ width: '100%', maxWidth: 460, background: 'var(--bg-card)', border: '1px solid var(--border-color)', borderRadius: 24, padding: 40 }}>
        <div style={{ textAlign: 'center', marginBottom: 32 }}>
          <Logo />
        </div>

        {step === 1 ? (
          <form onSubmit={handleAuthSubmit}>
            <h2 style={{ fontSize: 22, fontWeight: 800, marginBottom: 24, textAlign: 'center' }}>
              {isLogin ? 'Access Portal Entrance' : 'Deploy Core Earning Identity'}
            </h2>
            {!isLogin && (
              <div style={{ marginBottom: 16 }}>
                <label style={{ fontSize: 12, color: 'var(--clr-muted)', display: 'block', marginBottom: 6 }}>Legal Full Name</label>
                <input required type="text" className="withdraw-input" placeholder="e.g., Oluwaseun Ogunseye" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
              </div>
            )}

                  </div>
                )}

                <div style={{ marginBottom: 12 }}>
                  <label style={{ fontSize: 12, color: 'var(--clr-muted)', display: 'block', marginBottom: 4 }}>Protocol Engine Mode</label>
                  <select className="withdraw-input" value={taskFormInput.type} onChange={e => setTaskFormInput({...taskFormInput, type: e.target.value})}>
                    <option value="video">Stream Video Advertising Ad Block</option>
                    <option value="follow">Target Account Core Audience Growth</option>
                    <option value="like">Like Sentiment Data Verification</option>
                    <option value="comment">Detailed Feedback Audit Input</option>
                  </select>
                </div>

                <div style={{ marginBottom: 12 }}>
                  <label style={{ fontSize: 12, color: 'var(--clr-muted)', display: 'block', marginBottom: 4 }}>Brand Action Title String</label>
                  <input required type="text" className="withdraw-input" placeholder="e.g., Watch MTN 2026 Promo Advert" value={taskFormInput.title} onChange={e => setTaskFormInput({...taskFormInput, title: e.target.value})} />
                </div>

                <div style={{ marginBottom: 12 }}>
                  <label style={{ fontSize: 12, color: 'var(--clr-muted)', display: 'block', marginBottom: 4 }}>Destination Routing String (URL Target)</label>
                  <input required type="url" className="withdraw-input" placeholder="https://example.com" value={taskFormInput.url} onChange={e => setTaskFormInput({...taskFormInput, url: e.target.value})} />
                </div>

                <div style={{ marginBottom: 12 }}>
                  <label style={{ fontSize: 12, color: 'var(--clr-muted)', display: 'block', marginBottom: 4 }}>Micro-Allocation Reward Token Volume (₦ Value)</label>
                  <input required type="number" className="withdraw-input" placeholder="150" value={taskFormInput.reward} onChange={e => setTaskFormInput({...taskFormInput, reward: e.target.value})} />
                </div>

                <div style={{ marginBottom: 16 }}>
                  <label style={{ fontSize: 12, color: 'var(--clr-muted)', display: 'block', marginBottom: 4 }}>Contract Cluster Restriction Scope</label>
                  <select className="withdraw-input" value={taskFormInput.plan} onChange={e => setTaskFormInput({...taskFormInput, plan: e.target.value})}>
                    <option value="both">Unrestricted Global Release (Basic + Premium)</option>
                    <option value="basic">Isolate to Basic Framework Tier Exclusively</option>
                    <option value="premium">Isolate to Accelerated Premium Allocation Group</option>
                  </select>
                </div>

                <Btn full type="submit">Compile & BroadCast Task</Btn>
              </form>

              <div style={{ flex: 1.5, minWidth: 300 }}>
                <h3 style={{ fontWeight: 800, marginBottom: 16 }}>Live Runtime Active System Arrays ({globalTasksList.length})</h3>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10, maxHeight: 540, overflowY: 'auto', paddingRight: 4 }}>
                  {globalTasksList.map(t => (
                    <div key={t.id} style={{ background: 'var(--bg-card)', padding: 16, borderRadius: 12, border: '1px solid var(--border-color)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12 }}>
                      <div style={{ minWidth: 0 }}>
                        <div style={{ fontWeight: 700, fontSize: 14, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{t.title}</div>
                        <div style={{ display: 'flex', gap: 6, marginTop: 6 }}>
                          <Badge color={TASK_COLOR[t.type]}>{t.type}</Badge>
                          <Badge color="var(--clr-gold)">₦{t.reward}</Badge>
                          <Badge color="var(--clr-muted)">Target: {t.plan}</Badge>
                        </div>
                      </div>
                      <Btn variant="danger" size="sm" onClick={() => dispatchActionRemoveTask(t.id)}>Kill Node</Btn>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}

        {page === 'withdrawals' && (
          <div className="fade-in">
            <h1 style={{ fontSize: 24, fontWeight: 900, marginBottom: 6 }}>Settlement Allocation Ledger Pipelines</h1>
            <p style={{ color: 'var(--clr-muted)', fontSize: 14, marginBottom: 32 }}>Authoritatively route Paystack execution APIs or refuse transaction records.</p>
            
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {withdrawalsList.map(w => (
                <div key={w.id} style={{ background: 'var(--bg-card)', padding: 20, borderRadius: 14, border: '1px solid var(--border-color)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
                  <div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span style={{ fontWeight: 700 }}>{w.user}</span>
                      <Badge color={w.plan === 'basic' ? 'var(--clr-green)' : 'var(--clr-purple)'}>{w.plan}</Badge>
                    </div>
                    <div style={{ fontSize: 12, color: 'var(--clr-muted)', marginTop: 4 }}>{w.bank} Network • Account Node ID: {w.account}</div>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
                    <span style={{ fontWeight: 900, fontSize: 18, color: 'var(--clr-gold)' }}>{naira(w.amount)}</span>
                    {w.status === 'pending' ? (
                      <div style={{ display: 'flex', gap: 8 }}>
                        <Btn size="sm" onClick={() => dispatchActionApprove(w.id)}>Clear Pipeline</Btn>
                        <Btn variant="danger" size="sm" onClick={() => dispatchActionReject(w.id)}>Reject</Btn>
                      </div>
                    ) : (
                      <Badge color={w.status === 'approved' ? 'var(--clr-green)' : 'var(--clr-red)'}>
                        {w.status.toUpperCase()}
                      </Badge>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {page === 'users' && (
          <div className="fade-in">
            <h1 style={{ fontSize: 24, fontWeight: 900, marginBottom: 6 }}>Platform Profile Registry Security Cells</h1>
            <p style={{ color: 'var(--clr-muted)', fontSize: 14, marginBottom: 32 }}>Oversee profile balances and dynamically drop active states to preserve data stability metrics.</p>
            
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {userManagementRows.map(u => (
                <div key={u.id} style={{ background: 'var(--bg-card)', padding: 18, borderRadius: 14, border: '1px solid var(--border-color)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 12 }}>
                  <div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span style={{ fontWeight: 700, color: u.status === 'suspended' ? 'var(--clr-red)' : 'var(--clr-text)' }}>{u.name}</span>
                      {u.status === 'suspended' && <Badge color="var(--clr-red)">SUSPENDED</Badge>}
                    </div>
                    <div style={{ fontSize: 12, color: 'var(--clr-muted)', marginTop: 4 }}>{u.email} • Tracking Node Active Since {u.joined}</div>
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap' }}>
                    <Badge color={u.plan === 'basic' ? 'var(--clr-green)' : 'var(--clr-purple)'}>{u.plan}</Badge>
                    <span style={{ fontWeight: 700, color: 'var(--clr-gold)' }}>{naira(u.balance)}</span>
                    <span style={{ fontSize: 13, color: 'var(--clr-muted)' }}>Tasks: {u.tasks}</span>
                    <Btn variant={u.status === 'active' ? 'danger' : 'green'} size="sm" onClick={() => dispatchActionSuspendUser(u.id)}>
                      {u.status === 'active' ? 'Suspend Operator' : 'Reinstate Node'}
                    </Btn>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

// ─── SYSTEM ANCHOR APPARATUS ROOT ENGINE ─────────────────────────────────────
function App() {
  const [screen, setScreen] = useState('landing');
  const [activeRoleContext, setActiveRoleContext] = useState(null);
  const [routingPlanOverride, setRoutingPlanOverride] = useState(null);

  // Unified global system data pools state configurations
  const [globalTasksList, setGlobalTasksList] = useState(INITIAL_TASKS);
  const [userManagementRows, setUserManagementRows] = useState(INITIAL_USERS);
  const [withdrawalsList, setWithdrawalsList] = useState(INITIAL_WITHDRAWALS);
  
  // Specific Current Running Sandbox User State
  const [userBalance, setUserBalance] = useState(500);
  const [globalUserTasksState, setGlobalUserTasksState] = useState({});

  const handlePortalLoginResolution = (resolvedRole) => {
    setActiveRoleContext(resolvedRole);
    if (resolvedRole === 'premium') {
      setUserBalance(1000); // Setup standard baseline configuration asset conditions
    } else if (resolvedRole === 'basic') {
      setUserBalance(500);
    }
    setScreen('dashboard-portal');
  };

  const handlePortalLogoutSequence = () => {
    setActiveRoleContext(null);
    setGlobalUserTasksState({});
    setScreen('landing');
  };

  return (
    <div>
      {screen === 'landing' && <LandingPage setScreen={setScreen} setPlanSelection={setRoutingPlanOverride} />}
      {(screen === 'login' || screen === 'signup') && (
        <img style={{display:'none'}} src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='1' height='1'></svg>" onLoad={() => {}} />
      )}
      {screen === 'login' && <AuthPage mode="login" setScreen={setScreen} onLoginSuccess={handlePortalLoginResolution} initialSelectedPlan={routingPlanOverride} />}
      {screen === 'signup' && <AuthPage mode="signup" setScreen={setScreen} onLoginSuccess={handlePortalLoginResolution} initialSelectedPlan={routingPlanOverride} />}
      
      {screen === 'dashboard-portal' && (
        activeRoleContext === 'admin' ? (
          <AdminDashboard 
            onLogout={handlePortalLogoutSequence} 
            globalTasksList={globalTasksList} 
            setGlobalTasksList={setGlobalTasksList} 
            userManagementRows={userManagementRows} 
            setUserManagementRows={setUserManagementRows} 
            withdrawalsList={withdrawalsList} 
            setWithdrawalsList={setWithdrawalsList} 
          />
        ) : (
          <UserDashboard 
            plan={activeRoleContext} 
            onLogout={handlePortalLogoutSequence} 
            globalTasksList={globalTasksList}
            setGlobalTasksList={setGlobalTasksList}
            userBalance={userBalance}
            setUserBalance={setUserBalance}
            globalUserTasksState={globalUserTasksState}
            setGlobalUserTasksState={setGlobalUserTasksState}
            setWithdrawalsList={setWithdrawalsList}
          />
        )
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
